<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0f" />
    <meta
      name="description"
      content="Fab News — Live news from trusted sources worldwide"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Fab News" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    <title>Fab News — Live News</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Offline Banner -->
    <div class="offline-banner" id="offlineBanner">
      📡 You're offline — showing cached articles
    </div>

    <!-- Header -->
    <header>
      <div class="header-inner">
        <a href="#" class="logo">
          FAB NEWS
          <span>LIVE NEWS</span>
        </a>
        <div class="search-bar">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
          <input type="text" id="searchInput" placeholder="Search articles…" />
        </div>
        <div class="header-actions">
          <button class="btn-install" id="installBtn">
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
              <polyline points="7 10 12 15 17 10" />
              <line x1="12" y1="15" x2="12" y2="3" />
            </svg>
            Install
          </button>
        </div>
      </div>
    </header>

    <!-- Status Bar -->
    <div class="status-bar" id="statusBar">
      <div class="live-dot"></div>
      <span id="statusText">Fetching latest news…</span>
    </div>

    <!-- Breaking ticker -->
    <div class="ticker-wrap" id="tickerWrap" style="display: none">
      <div class="ticker-label">⚡ BREAKING</div>
      <div style="overflow: hidden; flex: 1">
        <div class="ticker-track" id="tickerTrack"></div>
      </div>
    </div>

    <!-- Categories -->
    <div class="category-bar">
      <div class="category-inner" id="catBar">
        <button class="cat-btn active" data-cat="general">
          🌐 Top Stories
        </button>
        <button class="cat-btn" data-cat="technology">💻 Tech</button>
        <button class="cat-btn" data-cat="business">📈 Business</button>
        <button class="cat-btn" data-cat="science">🔬 Science</button>
        <button class="cat-btn" data-cat="health">🏥 Health</button>
        <button class="cat-btn" data-cat="sports">⚽ Sports</button>
        <button class="cat-btn" data-cat="entertainment">
          🎬 Entertainment
        </button>
      </div>
    </div>

    <!-- Main Content -->
    <div class="main" id="mainContent">
      <!-- Feed -->
      <div id="feedCol">
        <!-- Skeleton -->
        <div id="skeletonLoader">
          <div class="sk-card">
            <div>
              <div
                class="skeleton"
                style="height: 12px; width: 80px; margin-bottom: 10px"
              ></div>
              <div
                class="skeleton"
                style="height: 18px; margin-bottom: 8px"
              ></div>
              <div
                class="skeleton"
                style="height: 18px; width: 75%; margin-bottom: 8px"
              ></div>
              <div class="skeleton" style="height: 12px; width: 60px"></div>
            </div>
            <div
              class="skeleton"
              style="height: 70px; border-radius: 8px"
            ></div>
          </div>
          <div class="sk-card">
            <div>
              <div
                class="skeleton"
                style="height: 12px; width: 80px; margin-bottom: 10px"
              ></div>
              <div
                class="skeleton"
                style="height: 18px; margin-bottom: 8px"
              ></div>
              <div
                class="skeleton"
                style="height: 18px; width: 75%; margin-bottom: 8px"
              ></div>
              <div class="skeleton" style="height: 12px; width: 60px"></div>
            </div>
            <div
              class="skeleton"
              style="height: 70px; border-radius: 8px"
            ></div>
          </div>
          <div class="sk-card">
            <div>
              <div
                class="skeleton"
                style="height: 12px; width: 80px; margin-bottom: 10px"
              ></div>
              <div
                class="skeleton"
                style="height: 18px; margin-bottom: 8px"
              ></div>
              <div
                class="skeleton"
                style="height: 18px; width: 75%; margin-bottom: 8px"
              ></div>
              <div class="skeleton" style="height: 12px; width: 60px"></div>
            </div>
            <div
              class="skeleton"
              style="height: 70px; border-radius: 8px"
            ></div>
          </div>
        </div>
        <div id="featuredArea"></div>
        <div id="feedGrid"></div>
      </div>

      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-widget">
          <div class="widget-title">🔥 Trending</div>
          <div id="trendingList"></div>
        </div>
        <div class="sidebar-widget">
          <div class="widget-title">📰 Sources</div>
          <div class="sources-grid">
            <div class="source-pill"><span class="dot"></span>BBC News</div>
            <div class="source-pill"><span class="dot"></span>Reuters</div>
            <div class="source-pill"><span class="dot"></span>AP News</div>
            <div class="source-pill"><span class="dot"></span>The Guardian</div>
            <div class="source-pill"><span class="dot"></span>NPR</div>
            <div class="source-pill"><span class="dot"></span>Al Jazeera</div>
            <div class="source-pill"><span class="dot"></span>TechCrunch</div>
            <div class="source-pill"><span class="dot"></span>Wired</div>
          </div>
        </div>
      </aside>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Article Modal -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
      <div class="modal-sheet" id="modalSheet">
        <div class="modal-handle"></div>
        <button
          class="modal-close"
          onclick="
            document.getElementById('modalOverlay').classList.remove('open')
          "
        >
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
        <div id="modalContent"></div>
      </div>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
      <div class="bottom-nav-inner">
        <div class="nav-item active" onclick="setNav(this, 'general')">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
          </svg>
          Home
        </div>
        <div class="nav-item" onclick="setNav(this, 'technology')">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <rect x="2" y="3" width="20" height="14" rx="2" />
            <line x1="8" y1="21" x2="16" y2="21" />
            <line x1="12" y1="17" x2="12" y2="21" />
          </svg>
          Tech
        </div>
        <div class="nav-item" onclick="setNav(this, 'science')">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"
            />
          </svg>
          Science
        </div>
        <div class="nav-item" onclick="setNav(this, 'business')">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <line x1="12" y1="1" x2="12" y2="23" />
            <path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6" />
          </svg>
          Business
        </div>
        <div class="nav-item" onclick="setNav(this, 'sports')">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="12" cy="12" r="10" />
            <path
              d="M4.93 4.93l4.24 4.24m5.66 5.66l4.24 4.24M4.93 19.07l4.24-4.24m5.66-5.66l4.24-4.24"
            />
          </svg>
          Sports
        </div>
      </div>
    </nav>

    <script src="app.js"></script>
  </body>
</html>
